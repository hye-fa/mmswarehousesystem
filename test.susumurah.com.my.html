<!DOCTYPE html>
<html lang="ms"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MMS Logistics Hub v15.4</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --primary: #2c3e50; --blue: #3498db; --green: #27ae60; --red: #e74c3c; --orange: #e67e22; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; padding: 10px; color: #333; }
        .container { max-width: 1100px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 5px 25px rgba(0,0,0,0.1); }
        .setup-grid { background: #e3f2fd; padding: 20px; border-radius: 12px; margin: 15px 0; border: 1px solid #bbdefb; }
        .overall-progress-container { background: #eee; border-radius: 20px; height: 26px; position: relative; overflow: hidden; margin: 15px 0; border: 1px solid #ddd; }
        .overall-progress-bar { background: linear-gradient(90deg, #27ae60, #2ecc71); height: 100%; transition: width 0.8s ease; }
        .progress-text { position: absolute; width: 100%; text-align: center; top: 4px; font-weight: bold; font-size: 0.85rem; z-index: 1; }
        .stock-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 15px; margin-bottom: 25px; }
        .stock-card { padding: 15px; border-radius: 10px; border-left: 6px solid #ccc; background: #f8fafc; }
        .day-section { margin-top: 25px; border: 1px solid #ddd; border-radius: 10px; overflow: hidden; background: #fff; }
        .day-header { background: var(--primary); color: white; padding: 12px; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; }
        td, th { padding: 12px; border-bottom: 1px solid #eee; text-align: left; font-size: 0.9rem; vertical-align: top; }
        .prio-item { background: #fff; border: 1px solid #ddd; padding: 10px; margin-bottom: 5px; border-radius: 6px; cursor: move; display: flex; justify-content: space-between; align-items: center; }
        .btn { padding: 10px 20px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-wa { background: #25D366; color: white; text-decoration: none; display: block; text-align: center; padding: 12px; border-radius: 8px; margin-top: 10px; font-weight: bold; }
        #toast-container { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 10000; }
        .toast { background: rgba(44, 62, 80, 0.95); color: white; padding: 12px 25px; border-radius: 30px; margin-bottom: 10px; animation: fadeInDown 0.4s; }
        @keyframes fadeInDown { from { transform: translateY(-50px); } to { transform: translateY(0); } }
    </style>
</head>
<body>

<div id="toast-container"></div>

<div id="loginOverlay" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); display:flex; justify-content:center; align-items:center; z-index:9999;">
    <div style="background:white; padding:35px; border-radius:15px; width:320px; text-align:center;">
        <h3>🔐 Hub Logistik MMS</h3>
        <input type="text" id="loginUser" style="width:100%; padding:12px; margin-bottom:12px; border:1px solid #ccc; border-radius:6px;" placeholder="User ID">
        <input type="password" id="loginPass" style="width:100%; padding:12px; margin-bottom:15px; border:1px solid #ccc; border-radius:6px;" placeholder="Password">
        <button onclick="performLogin()" class="btn" style="background:var(--blue); color:white; width:100%;">LOG MASUK</button>
    </div>
</div>

<div class="container" id="mainApp" style="display:none;">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
        <h2>🚚 MMS Hub: <span id="userDisplay"></span></h2>
        <button onclick="logout()" class="btn" style="background:var(--red); color:white;">Logout</button>
    </div>

    <div id="adminArea" class="setup-grid" style="display:none;">
        <strong>🔄 Global Management:</strong><br>
        <input type="file" id="excelInput" onchange="handleExcel(event)" style="margin:15px 0;">
        <button id="saveBtn" onclick="saveDataToServer()" class="btn" style="background:var(--green); color:white; display:none;">💾 Simpan Ke Database</button>
        <div style="display:flex; gap:12px; margin-top:15px;">
            <select id="adminDealerFilter" onchange="processAndRender()" style="flex:1; padding:10px; border-radius:6px; border:1px solid #ccc;"></select>
            <select id="adminDistrictFilter" onchange="processAndRender()" style="flex:1; padding:10px; border-radius:6px; border:1px solid #ccc;"></select>
        </div>
    </div>

    <div class="overall-progress-container">
        <div class="overall-progress-bar" id="overallBar"></div>
        <div class="progress-text" id="overallText">Memuatkan...</div>
    </div>

    <div style="border:1px solid var(--blue); border-radius:12px; padding:20px; background:#fff; margin-bottom:25px;">
        <h4 style="margin:0 0 15px 0; color:var(--blue);">📈 Dealer Delivery Analytics</h4>
        <div style="overflow-x:auto;">
            <table>
                <thead><tr><th>Dealer</th><th>Sekolah</th><th>Progress (%)</th><th>Baki Muatan</th></tr></thead>
                <tbody id="dealerSummaryBody"></tbody>
            </table>
        </div>
    </div>

    <div class="stock-grid" id="stockDetails"></div>
    <div id="mainDisplay"></div>

    <div id="vehicleSection" style="background:#f1f8e9; padding:15px; border-radius:10px; margin-top:30px; border:1px solid #c5e1a5;">
        <strong>🚛 Daftar Kenderaan Master:</strong>
        <div id="vehicleList" style="margin:12px 0;"></div>
        <div style="display:flex; gap:10px;">
            <button onclick="addVehicleRow()" class="btn" style="background:var(--blue); color:white;">+ Tambah Lori</button>
            <button onclick="saveVehicles()" class="btn" style="background:var(--green); color:white;">💾 Simpan Senarai Lori</button>
        </div>
    </div>

    <div id="tripArea" style="background:#fff9db; padding:20px; border-radius:10px; border:1px solid #fab005; margin-top:20px;">
        <strong>📦 Susun & Pilih Lori Untuk Janaan Trip:</strong>
        <div id="activeVehicleChecklist" style="margin:15px 0; display:flex; flex-wrap:wrap; gap:10px;"></div>
        <select id="filterDateSelect" onchange="initJanaanSession()" style="width:100%; padding:10px; margin-top:10px; border:1px solid #ccc; border-radius:6px;"></select>
        
        <div id="priorityArea" style="display:none; margin-top:15px;">
            <div style="margin-bottom:10px;"><strong>Urutan Priority (Drag untuk susun):</strong></div>
            <div id="priorityDisplayList" style="background:white; border-radius:6px; margin-bottom:15px; max-height:200px; overflow-y:auto; padding:10px; border:1px solid #ddd;"></div>
            <button onclick="calculateTrips()" class="btn" style="background:var(--orange); color:white; width:100%; padding:15px; font-size:1.1rem;">⚡ JANA TRIP</button>
        </div>
    </div>
    <div id="results"></div>
</div>

<script>
    let schoolsData = [], registeredVehicles = [], currentPriorityQueue = [];
    let currentDealer = localStorage.getItem('mms_dealer_id'), currentRole = localStorage.getItem('mms_role');
    const PALLET_SIZE = 144; // 1 pallet = 144 ctn

    function showToast(msg) {
        const c = document.getElementById('toast-container');
        const t = document.createElement('div'); t.className = 'toast'; t.innerText = "✅ " + msg;
        c.appendChild(t); setTimeout(() => t.remove(), 2500);
    }

    // Fungsi Pengiraan Format Pallet/Ctn/Pcs
    function calcFullMuatan(ctnTotal, pcsExtra = 0) {
        let totalCtn = Number(ctnTotal);
        let extraPcs = Number(pcsExtra);
        
        // Convert extra pcs to ctn if 24 or more
        if (extraPcs >= 24) {
            totalCtn += Math.floor(extraPcs / 24);
            extraPcs = extraPcs % 24;
        }
        
        const pallet = Math.floor(totalCtn / PALLET_SIZE);
        const bakiCtn = totalCtn % PALLET_SIZE;
        
        let result = [];
        if (pallet > 0) result.push(`${pallet} pallet`);
        if (bakiCtn > 0 || (pallet === 0 && extraPcs === 0)) result.push(`${bakiCtn} ctn`);
        if (extraPcs > 0) result.push(`${extraPcs} pcs`);
        
        return "(" + result.join(' + ') + ")";
    }

    async function loadDataFromServer() {
        if(!currentDealer) return;
        document.getElementById('loginOverlay').style.display='none';
        document.getElementById('mainApp').style.display='block';
        document.getElementById('userDisplay').innerText = currentDealer.toUpperCase();
        if(currentRole === 'admin') document.getElementById('adminArea').style.display='block';
        try {
            const r = await fetch(`api.php?action=get_schools&dealer=${currentDealer}&role=${currentRole}&t=${Date.now()}`);
            const res = await r.json();
            schoolsData = Array.isArray(res) ? res.map(s => ({...s, isDelivered: s.isDelivered==1, isDocSigned: s.isDocSigned==1})) : [];
            await loadVehicles(); updateFilters(); processAndRender();
        } catch (e) { console.error("Ralat muat data server"); }
    }

    function processAndRender() {
        const c = document.getElementById('mainDisplay'); c.innerHTML = "";
        let fD = schoolsData;
        if (currentRole === 'admin') {
            const sd = document.getElementById('adminDealerFilter').value, sx = document.getElementById('adminDistrictFilter').value;
            if (sd && sd !== 'all') fD = fD.filter(x => x.dealer === sd);
            if (sx && sx !== 'all') fD = fD.filter(x => x.district === sx);
        } else fD = fD.filter(x => x.dealer === currentDealer);

        updateAnalyticsUI(fD);
        const grp = fD.reduce((g, s) => { const d = s.plan_date || "Tiada Tarikh"; (g[d] = g[d] || []).push(s); return g; }, {});
        Object.keys(grp).sort().forEach(dt => {
            let rC = 0, rP = 0; grp[dt].forEach(s => { rC += Number(s.totalCartons); rP += Number(s.extraPacks); });
            c.innerHTML += `<div class="day-section"><div class="day-header">📅 ${dt}</div><div style="background:#f1f4f9;padding:10px;font-size:0.85rem;font-weight:bold;">📊 Muatan: ${calcFullMuatan(rC, rP)}</div><table>${grp[dt].map(s => `<tr><td><strong>${s.name}</strong><br><small>📍 ${s.district} | ${s.dealer.toUpperCase()} | ${s.totalCartons} ctn (${calcFullMuatan(s.totalCartons, s.extraPacks)})</small><div style="margin-top:8px;display:flex;gap:15px;background:#f8f9fa;padding:5px;border-radius:4px;"><label><input type="checkbox" ${s.isDelivered?'checked':''} onchange="updateRec('${s.id}','isDelivered',this.checked)"> Hantar</label><label><input type="checkbox" ${s.isDocSigned?'checked':''} onchange="updateRec('${s.id}','isDocSigned',this.checked)"> SAP</label></div></td><td style="text-align:right"><small>Plan: <input type="date" value="${s.plan_date||''}" onchange="updateRec('${s.id}','plan_date',this.value)" style="padding:3px;width:120px;"></small><br><small>Hantar: <input type="date" value="${s.delivery_date||''}" onchange="updateRec('${s.id}','delivery_date',this.value)" style="padding:3px;width:120px;margin-top:5px;"></small></td></tr>`).join('')}</table></div>`;
        });
    }

    function updateAnalyticsUI(data) {
        const dealers = [...new Set(schoolsData.map(s => s.dealer))].filter(x => x).sort();
        document.getElementById('dealerSummaryBody').innerHTML = dealers.map(d => {
            const dS = schoolsData.filter(s => s.dealer === d);
            const t = dS.length, dn = dS.filter(s => s.isDelivered).length, pc = t ? Math.round(dn/t*100) : 0;
            let bC = 0, bP = 0; dS.filter(s => !s.isDelivered).forEach(s => { bC += Number(s.totalCartons); bP += Number(s.extraPacks); });
            return `<tr><td><strong>${d.toUpperCase()}</strong></td><td>${dn}/${t}</td><td>${pc}%</td><td><small style="color:red;font-weight:bold;">${calcFullMuatan(bC, bP)}</small></td></tr>`;
        }).join('');
        let tP = 0, dP = 0; data.forEach(s => { const pk = (Number(s.totalCartons)*24) + Number(s.extraPacks); tP += pk; if(s.isDelivered) dP += pk; });
        const ovP = tP ? Math.round(dP/tP*100) : 0; document.getElementById('overallBar').style.width = ovP + "%"; document.getElementById('overallText').innerText = `Progres Keseluruhan: ${ovP}%`;
        document.getElementById('stockDetails').innerHTML = `<div class="stock-card card-blue"><small>🔵 PERLU</small><br><b>${calcFullMuatan(Math.floor(tP/24), tP%24)}</b></div><div class="stock-card card-green"><small>🟢 SIAP</small><br><b>${calcFullMuatan(Math.floor(dP/24), dP%24)}</b></div><div class="stock-card card-red"><small>🔴 BAKI</small><br><b>${calcFullMuatan(Math.floor((tP-dP)/24), (tP-dP)%24)}</b></div>`;
    }

    // --- SMART TRIP ENGINE WITH WHATSAPP FORMAT v15.4 ---
    function calculateTrips() {
        let activeV = Array.from(document.querySelectorAll('.v-sel:checked')).map(cb => ({ v_name: cb.value, v_capacity: Number(cb.dataset.cap) }));
        if (activeV.length === 0) return alert("Pilih lori!");
        
        let q = []; 
        document.querySelectorAll('.prio-item').forEach(item => { 
            const school = currentPriorityQueue.find(s => s.id === item.dataset.id); 
            if(school) q.push(JSON.parse(JSON.stringify(school))); 
        });

        const date = document.getElementById('filterDateSelect').value;
        let trips = [], tripCount = 0;

        while (q.length > 0 && tripCount < 40) {
            tripCount++; 
            let currentTrip = { id: tripCount, tC: 0, tP: 0, lorries: [] };
            activeV.sort((a,b) => b.v_capacity - a.v_capacity);
            
            activeV.forEach(lori => {
                let lC = 0, lP = 0, items = [];
                for (let i = 0; i < q.length; i++) {
                    let sCtn = Number(q[i].totalCartons);
                    let sPcs = Number(q[i].extraPacks || 0);

                    if (lC + sCtn <= lori.v_capacity) { 
                        lC += sCtn; 
                        lP += sPcs;
                        items.push({...q[i], note: ""}); 
                        q.splice(i, 1); 
                        i--; 
                    } else if (lC < lori.v_capacity) { 
                        let r = lori.v_capacity - lC; 
                        items.push({...q[i], totalCartons: r, extraPacks: 0, note: "(Pecahan)"}); 
                        q[i].totalCartons = sCtn - r; 
                        lC += r; 
                    }
                }
                if (items.length > 0) { 
                    currentTrip.lorries.push({ ...lori, lC, lP, items }); 
                    currentTrip.tC += lC; 
                    currentTrip.tP += lP;
                }
            });
            if (currentTrip.lorries.length > 0) trips.push(currentTrip); else break;
        }
        renderTripResults(trips, date);
    }

    function renderTripResults(trips, date) {
        let resHtml = `<h3>🚚 Hasil Janaan: ${date}</h3>`;
        trips.forEach(t => {
            // WHATSAPP HEADER
            let muatanTripFormat = calcFullMuatan(t.tC, t.tP);
            let wa = `*TRIP ${t.id} - ${date}*\n${muatanTripFormat}\n`;
            
            let tH = `<div style="border:2px solid var(--primary); padding:15px; margin-top:15px; border-radius:10px; background:#fff;">
                        <h4>TRIP ${t.id}</h4><small>${muatanTripFormat}</small>`;
            
            t.lorries.forEach(l => { 
                const p = Math.round((l.lC/l.v_capacity)*100); 
                tH += `<div style="margin-top:10px; border-left:4px solid var(--blue); padding-left:10px;">
                        <b>🚛 ${l.v_name}</b> (${p}% Full)<br>
                        <ul style="font-size:11px; margin:5px 0;">${l.items.map(s => `<li>${s.name}: ${s.totalCartons} ctn ${s.extraPacks > 0 ? '+ ' + s.extraPacks + ' pcs' : ''} <span style="color:red">${s.note}</span></li>`).join('')}</ul></div>`; 
                
                // Lori Header in WA
                wa += `\n*${l.v_name}* (${p}%)\n`;
                wa += l.items.map(s => `- ${s.name}: ${s.totalCartons} ctn ${s.extraPacks > 0 ? '+ ' + s.extraPacks + ' pcs' : ''} ${s.note}`).join('\n') + `\n`; 
            });
            
            tH += `<button onclick="window.open('https://wa.me/?text=${encodeURIComponent(wa)}')" class="btn-wa">📲 WhatsApp Trip ${t.id}</button></div>`; 
            resHtml += tH;
        });
        document.getElementById('results').innerHTML = resHtml;
    }

    // --- UTILS: DRAG, EXCEL, LOGIN ---
    function initJanaanSession() { const dt = document.getElementById('filterDateSelect').value; currentPriorityQueue = schoolsData.filter(s => s.plan_date === dt && !s.isDelivered); if(currentPriorityQueue.length > 0) { document.getElementById('priorityArea').style.display='block'; document.getElementById('priorityDisplayList').innerHTML = currentPriorityQueue.map((s,i) => `<div class="prio-item" draggable="true" data-id="${s.id}" ondragstart="drag(event)" ondragover="allowDrop(event)" ondrop="drop(event)"><span>${i+1}. <b>${s.name}</b> (${s.totalCartons} ctn)</span><small>↕ Drag</small></div>`).join(''); } }
    function allowDrop(ev) { ev.preventDefault(); }
    function drag(ev) { ev.dataTransfer.setData("id", ev.target.dataset.id); }
    function drop(ev) { ev.preventDefault(); const dId = ev.dataTransfer.getData("id"); const tEl = ev.target.closest('.prio-item'); if (tEl && dId !== tEl.dataset.id) { const list = document.getElementById('priorityDisplayList'), items = Array.from(list.children); const dIdx = items.findIndex(x => x.dataset.id === dId), tIdx = items.findIndex(x => x.dataset.id === tEl.dataset.id); if (dIdx > tIdx) list.insertBefore(items[dIdx], items[tIdx]); else list.insertBefore(items[dIdx], items[tIdx].nextSibling); Array.from(list.children).forEach((x, i) => { x.querySelector('span').firstChild.textContent = (i + 1) + ". "; }); } }
    async function loadVehicles() { const r = await fetch(`api.php?action=get_vehicles&dealer=${currentDealer}&t=${Date.now()}`); registeredVehicles = await r.json(); const list = document.getElementById('vehicleList'), chk = document.getElementById('activeVehicleChecklist'); list.innerHTML = ''; chk.innerHTML = ''; if (Array.isArray(registeredVehicles)) { registeredVehicles.forEach(v => { list.innerHTML += `<div class="v-row"><span style="background:var(--primary);color:white;padding:4px;border-radius:4px;font-size:10px;min-width:60px;text-align:center;">${v.owner}</span><input type="text" class="v-name" value="${v.v_name}" style="flex:1;"><input type="number" class="v-cap" value="${v.v_capacity}" style="width:70px;"><button onclick="this.parentElement.remove()" style="color:red;background:none;border:none;cursor:pointer;">✖</button></div>`; chk.innerHTML += `<label style="background:white;padding:10px;border:1px solid #ddd;border-radius:8px;cursor:pointer;"><input type="checkbox" class="v-sel" value="${v.v_name}" data-cap="${v.v_capacity}" checked> ${v.v_name} (${v.v_capacity} ctn)</label>`; }); } }
    function addVehicleRow() { document.getElementById('vehicleList').innerHTML += `<div class="v-row"><span style="background:var(--primary);color:white;padding:4px;border-radius:4px;font-size:10px;min-width:60px;text-align:center;">${currentDealer}</span><input type="text" class="v-name" placeholder="Nama" style="flex:1;"><input type="number" class="v-cap" placeholder="Cap" style="width:70px;"><button onclick="this.parentElement.remove()" style="color:red;background:none;border:none;cursor:pointer;">✖</button></div>`; }
    async function saveVehicles() { const data = Array.from(document.querySelectorAll('.v-row')).map(r => ({ v_name: r.querySelector('.v-name').value, v_capacity: Number(r.querySelector('.v-cap').value), owner: currentDealer })); await fetch(`api.php?action=save_vehicles_global`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data.filter(v => v.v_name !== "")) }); showToast("Lori disimpan!"); await loadVehicles(); }
    async function updateRec(id, f, v) { const s = schoolsData.find(x => x.id === id); s[f] = v; if(f === 'isDelivered' && v && !s.delivery_date) s.delivery_date = new Date().toISOString().split('T')[0]; processAndRender(); await fetch(`api.php?action=save_schools&dealer=${currentDealer}`, { method:'POST', body: JSON.stringify([s]) }); showToast(`Autosave: ${s.name}`); }
    function performLogin() { const u = document.getElementById('loginUser').value.toLowerCase(), p = document.getElementById('loginPass').value; fetch('api.php?action=login', { method:'POST', body: JSON.stringify({username:u, password:p}) }).then(r => r.json()).then(res => { localStorage.setItem('mms_dealer_id', res.user.username); localStorage.setItem('mms_role', res.user.role); location.reload(); }); }
    function logout() { localStorage.clear(); location.reload(); }
    function updateFilters() { const ds = [...new Set(schoolsData.map(s => s.dealer))].filter(x => x).sort(), ts = [...new Set(schoolsData.map(s => s.district))].filter(x => x).sort(); if(document.getElementById('adminDealerFilter')) document.getElementById('adminDealerFilter').innerHTML = '<option value="all">Semua Dealer</option>' + ds.map(x => `<option value="${x}">${x.toUpperCase()}</option>`).join(''); if(document.getElementById('adminDistrictFilter')) document.getElementById('adminDistrictFilter').innerHTML = '<option value="all">Semua Daerah</option>' + ts.map(x => `<option value="${x}">${x.toUpperCase()}</option>`).join(''); const dts = [...new Set(schoolsData.map(s => s.plan_date))].filter(x => x && x !== "0000-00-00").sort(); document.getElementById('filterDateSelect').innerHTML = '<option value="">Pilih Tarikh Jana Trip</option>' + dts.map(x => `<option value="${x}">${x}</option>`).join(''); }
    function handleExcel(e) { const reader = new FileReader(); reader.onload = (ev) => { const json = XLSX.utils.sheet_to_json(XLSX.read(new Uint8Array(ev.target.result), {type:'array', cellDates:true}).Sheets[XLSX.read(new Uint8Array(ev.target.result), {type:'array'}).SheetNames[0]], {defval:""}); schoolsData = json.map(row => { const id = row['Kod Sekolah'] || row['id']; if(!id) return null; const bP = Number(row['Bil Pelajar'] || 0), bH = Number(row['Bil Hari'] || 0), t = bP * bH; let pD = row['plan_date'] || row['Tarikh Rancangan'] || ""; if(pD instanceof Date) pD = pD.toISOString().split('T')[0]; return { id:String(id).trim(), name:(row['Sekolah']||row['name']||"").trim(), district:(row['Daerah']||row['district']||"N/A").trim(), dealer:(row['dealer']||"mms").toLowerCase().trim(), plan_date:pD, totalCartons:Math.floor(t/24), extraPacks:t%24, isDelivered:false, isDocSigned:false }; }).filter(x => x); document.getElementById('saveBtn').style.display='block'; processAndRender(); }; reader.readAsArrayBuffer(e.target.files[0]); }
    async function saveDataToServer() { await fetch(`api.php?action=save_schools&dealer=admin&role=admin`, { method:'POST', body: JSON.stringify(schoolsData) }); showToast("Data disimpan!"); await loadDataFromServer(); }
    window.onload = loadDataFromServer;
</script>
</body>
</html>
