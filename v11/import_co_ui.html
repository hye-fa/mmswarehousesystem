<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Import CO / Student Data</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100 p-8">

    <div class="max-w-2xl mx-auto bg-white rounded-lg shadow-md p-6">
        <h2 class="text-2xl font-bold mb-6 text-gray-800 border-b pb-2">
            <i class="fas fa-file-invoice-dollar mr-2"></i> Update CO / Student Counts
        </h2>

        <form id="coImportForm" class="space-y-4">
            
            <!-- Global Values for this Batch -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 bg-blue-50 p-4 rounded-md border border-blue-100">
                <div>
                    <label class="block text-sm font-medium text-gray-700">No Kontrak (Contract No)</label>
                    <input type="text" name="contract_no" required placeholder="e.g. KPM-2025-01" 
                           class="mt-1 block w-full rounded-md border-gray-300 shadow-sm border p-2 focus:ring-blue-500 focus:border-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">CO Number</label>
                    <select name="co_no" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm border p-2">
                        <option value="1">CO #1</option>
                        <option value="2">CO #2</option>
                        <option value="3">CO #3</option>
                        <option value="4">CO #4</option>
                        <option value="5">CO #5</option>
                        <option value="6">CO #6</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Month / Session</label>
                    <input type="text" name="month_session" required placeholder="e.g. October 2025" 
                           class="mt-1 block w-full rounded-md border-gray-300 shadow-sm border p-2">
                </div>
            </div>

            <!-- File Upload -->
            <div>
                <label class="block text-sm font-medium text-gray-700">Upload CSV File</label>
                <div class="mt-1 flex justify-center px-6 pt-5 pb-6 border-2 border-gray-300 border-dashed rounded-md hover:bg-gray-50 transition">
                    <div class="space-y-1 text-center">
                        <i class="fas fa-file-csv text-4xl text-green-600 mb-3"></i>
                        <div class="flex text-sm text-gray-600">
                            <label for="csv_file" class="relative cursor-pointer bg-white rounded-md font-medium text-blue-600 hover:text-blue-500 focus-within:outline-none">
                                <span>Upload a file</span>
                                <input id="csv_file" name="csv_file" type="file" accept=".csv" class="sr-only" required>
                            </label>
                            <p class="pl-1">or drag and drop</p>
                        </div>
                        <p class="text-xs text-gray-500">CSV format: KOD SEKOLAH, BIL MURID...</p>
                        <p id="filename-display" class="text-sm font-bold text-gray-800 mt-2"></p>
                    </div>
                </div>
            </div>

            <button type="submit" id="submitBtn" class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500">
                Process Import
            </button>
        </form>

        <!-- Results Area -->
        <div id="results" class="mt-6 hidden">
            <h3 class="text-lg font-medium text-gray-900">Import Results</h3>
            <div class="mt-2 bg-gray-50 p-4 rounded text-sm font-mono overflow-auto max-h-60" id="log-output">
                <!-- Logs go here -->
            </div>
        </div>
    </div>

    <script>
        // Simple file name display
        document.getElementById('csv_file').addEventListener('change', function(e) {
            if(e.target.files[0]) {
                document.getElementById('filename-display').innerText = e.target.files[0].name;
            }
        });

        document.getElementById('coImportForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const btn = document.getElementById('submitBtn');
            const resultsDiv = document.getElementById('results');
            const logOutput = document.getElementById('log-output');
            
            btn.disabled = true;
            btn.innerText = "Processing...";
            resultsDiv.classList.remove('hidden');
            logOutput.innerHTML = "Uploading and analyzing...<br>";

            const formData = new FormData(this);

            try {
                // Ensure this path matches where you save your PHP file
                const response = await fetch('api/save_co_update.php', {
                    method: 'POST',
                    body: formData
                });

                // Handle non-JSON responses (like 404s or PHP errors)
                if (!response.ok) {
                    throw new Error(`Server returned ${response.status}: ${response.statusText}`);
                }

                const result = await response.json();

                if (result.success) {
                    logOutput.innerHTML += `<span class="text-green-600 font-bold">Success!</span><br>`;
                    logOutput.innerHTML += `Updated: ${result.updated} schools<br>`;
                    logOutput.innerHTML += `Skipped (Not Found): ${result.skipped}<br>`;
                    
                    if(result.errors && result.errors.length > 0) {
                        logOutput.innerHTML += `<br><strong>Not Found / Errors:</strong><br>`;
                        result.errors.forEach(err => {
                            logOutput.innerHTML += `<span class="text-red-500">${err}</span><br>`;
                        });
                    }
                } else {
                    logOutput.innerHTML += `<span class="text-red-600 font-bold">Error: ${result.message}</span>`;
                }

            } catch (error) {
                console.error(error);
                logOutput.innerHTML += `<span class="text-red-600">System Error: ${error.message}. Check console.</span>`;
            } finally {
                btn.disabled = false;
                btn.innerText = "Process Import";
            }
        });
    </script>
</body>
</html>
